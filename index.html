<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BunnyEra | 兔兔纪元官方网站</title>
    <style>
        /* 全局样式重置与暗黑底色 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0a0b0d;
            color: #ffffff;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 80% 20%, rgba(0, 242, 254, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 20% 80%, rgba(255, 0, 128, 0.05) 0%, transparent 40%);
        }

        /* 导航栏设计 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: rgba(10, 11, 13, 0.8);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 模拟图中霓虹兔子的Logo符号 */
        .logo-icon {
            width: 30px;
            height: 30px;
            border: 2px solid #00f2fe;
            border-radius: 50%;
            box-shadow: 0 0 10px #00f2fe;
            display: inline-block;
            position: relative;
        }

        nav a {
            color: #a0a5b5;
            text-decoration: none;
            margin-left: 35px;
            font-size: 15px;
            transition: color 0.3s;
        }

        nav a:hover, nav a.active {
            color: #00f2fe;
            text-shadow: 0 0 8px rgba(0, 242, 254, 0.6);
        }

        .btn-connect {
            background: transparent;
            border: 1px solid #00f2fe;
            color: #00f2fe;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
            transition: all 0.3s ease;
        }

        .btn-connect:hover {
            background: #00f2fe;
            color: #0a0b0d;
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.8);
        }

        /* 主视觉第一屏布局 */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 0 8%;
            padding-top: 80px;
            position: relative;
        }

        .hero-content {
            flex: 1;
            max-width: 600px;
            z-index: 2;
        }

        .hero-subtitle {
            color: #00f2fe;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 14px;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .hero-title {
            font-size: 56px;
            line-height: 1.1;
            margin-bottom: 25px;
            font-weight: 800;
        }

        .hero-title span {
            color: #00f2fe;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.6);
        }

        .hero-desc {
            color: #8a8f9e;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .cta-group {
            display: flex;
            gap: 20px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            color: #0a0b0d;
            border: none;
            padding: 15px 35px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 25px rgba(0, 242, 254, 0.4);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 35px rgba(0, 242, 254, 0.7);
        }

        /* 右侧高画质 3D 质感核心展示区 */
        .hero-display {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        /* 模拟图中的高质感立体水晶框效果 */
        .crystal-card {
            width: 380px;
            height: 480px;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4), inset 0 0 20px rgba(255,255,255,0.05);
            position: relative;
            transition: transform 0.5s ease;
        }

        .crystal-card:hover {
            transform: translateY(-10px) rotateY(5px);
            border-color: rgba(0, 242, 254, 0.4);
        }

        /* 图中的冷光兔子霓虹符号 */
        .neon-bunny {
            width: 180px;
            height: 180px;
            border: 4px solid #00f2fe;
            border-radius: 40px;
            margin-top: 40px;
            box-shadow: 0 0 30px #00f2fe, inset 0 0 20px #00f2fe;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            animation: breathe 3s infinite alternate;
        }

        /* 简易兔子耳朵线条效果 */
        .neon-bunny::before, .neon-bunny::after {
            content: '';
            position: absolute;
            top: -45px;
            width: 35px;
            height: 60px;
            border: 4px solid #00f2fe;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 0 20px #00f2fe;
        }
        .neon-bunny::before { left: 35px; transform: rotate(-10px); }
        .neon-bunny::after { right: 35px; transform: rotate(10px); }

        .card-info {
            text-align: center;
            width: 100%;
        }

        .card-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .card-tag {
            display: inline-block;
            background: rgba(0, 242, 254, 0.1);
            color: #00f2fe;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid rgba(0, 242, 254, 0.2);
        }

        /* 霓虹呼吸动画 */
        @keyframes breathe {
            0% {
                box-shadow: 0 0 20px rgba(0, 242, 254, 0.4), inset 0 0 15px rgba(0, 242, 254, 0.3);
                opacity: 0.9;
            }
            100% {
                box-shadow: 0 0 40px rgba(0, 242, 254, 0.9), inset 0 0 25px rgba(0, 242, 254, 0.6);
                opacity: 1;
            }
        }

        /* 响应式适配 */
        @media (max-width: 968px) {
            .hero {
                flex-direction: column;
                text-align: center;
                padding-top: 140px;
                padding-bottom: 60px;
            }
            .hero-content {
                margin-bottom: 50px;
                max-width: 100%;
            }
            .cta-group {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <div class="logo-icon"></div>
            BunnyEra
        </div>
        <nav>
            <a href="#" class="active">首页</a>
            <a href="#">纪元宇宙</a>
            <a href="#">潮玩盲盒</a>
            <a href="#">关于我们</a>
        </nav>
        <button class="btn-connect">进入纪元</button>
    </header>

    <section class="hero">
        <div class="hero-content">
            <div class="hero-subtitle">Next-Gen IP Ecosystem</div>
            <h1 class="hero-title">欢迎来到全新的<br><span>兔兔纪元</span></h1>
            <p class="hero-desc">
                打破传统网页的平庸布局，融合尖端暗黑赛博美学。在这里，每一个潮流数字盲盒、每一个IP角色都将被赋予全新的生命力。加入我们，开启属于未来的高质感视觉盛宴。
            </p>
            <div class="cta-group">
                <button class="btn-primary">探索盲盒空间</button>
            </div>
        </div>

        <div class="hero-display">
            <div class="crystal-card">
                <div class="neon-bunny">
                    </div>
                <div class="card-info">
                    <h3 class="card-title">Bunny-Cyber #001</h3>
                    <span class="card-tag">限量版纪念实体/NFT</span>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
